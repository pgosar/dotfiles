$font_family = JetBrainsMono Nerd Font
$text_color = rgb(230, 220, 209)
$accent_color = rgb(230, 180, 115)
$box_bg = rgba(40, 40, 46, 0.9)
$box_border = rgb(107, 100, 117)
$text = cmd[update:1000] echo "$(date +"%H:%M")"

general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = true
    hide_cursor = true
}

background {
    monitor =
    path = ~/Pictures/walls/du3gwu0y5rm51.jpg
    blur_passes = 3
    blur_size = 8
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# ==========================================
# 1440p G5 (STANDARD SIZE)
# ==========================================

# Password Input
input-field {
    monitor = desc:Samsung Electric Company Odyssey G5 HNBY700285
    size = 250, 60
    outline_thickness = 2
    dots_center = true
    outer_color = $box_border
    inner_color = $box_bg
    font_color = $text_color
    font_family = $font_family Bold
    placeholder_text = <i><span foreground="##a28ba6">Password...</span></i>
    fade_on_empty = false
    position = 0, -120
    halign = center
    valign = center
}

# Time
label {
    monitor = desc:Samsung Electric Company Odyssey G5 HNBY700285
    text = $text
    color = $accent_color
    font_size = 120
    font_family = $font_family ExtraBold
    position = 0, -300
    halign = center
    valign = top
}

# Welcome
label {
    monitor = desc:Samsung Electric Company Odyssey G5 HNBY700285
    text = Welcome back, Pranay
    color = $text_color
    font_size = 25
    font_family = $font_family Bold
    position = 0, -40
    halign = center
    valign = center
}

# ==========================================
# 4K OLED (150% UPSCALE)
# ==========================================

input-field {
    monitor = desc:Microstep MPG321UX OLED 0x01010101
    size = 375, 90
    outline_thickness = 3
    dots_center = true
    outer_color = $box_border
    inner_color = $box_bg
    font_color = $text_color
    font_family = $font_family Bold
    placeholder_text = <i><span foreground="##a28ba6">Password...</span></i>
    fade_on_empty = false
    position = 0, -180
    halign = center
    valign = center
}

# Time
label {
    monitor = desc:Microstep MPG321UX OLED 0x01010101
    text = $text
    color = $accent_color
    font_size = 180
    font_family = $font_family ExtraBold
    position = 0, -450
    halign = center
    valign = top
}

# Welcome
label {
    monitor = desc:Microstep MPG321UX OLED 0x01010101
    text = Welcome back, Pranay
    color = $text_color
    font_size = 38
    font_family = $font_family Bold
    position = 0, -60
    halign = center
    valign = center
}
