source = ~/.config/hypr/colors.conf
source = ~/.config/hypr/monitors.conf

###############
# ENVIRONMENT #
###############

env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = OZONE_PLATFORM,wayland
env = MOZ_ENABLE_WAYLAND,1
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

################
# AUTOSTART    #
################

exec-once = hyprpm reload -n
exec-once = hypridle
exec-once = hyprpaper
exec-once = ~/.config/waybar/scripts/launch.sh
exec-once = exec /usr/lib/hyprpolkitagent/hyprpolkitagent &
exec-once = nm-applet
exec-once = blueman-applet

################
# WORKSPACES   #
################

workspace = 1, monitor:$monitor1, default:true, persistent:true
workspace = 2, monitor:$monitor1, persistent:true
workspace = 3, monitor:$monitor1, persistent:true
workspace = 4, monitor:$monitor1, persistent:true
workspace = 5, monitor:$monitor1, persistent:true
workspace = 6, monitor:$monitor1, persistent:true
workspace = 7, monitor:$monitor1, persistent:true
workspace = 8, monitor:$monitor1, persistent:true
workspace = 9, monitor:$monitor1, persistent:true
workspace = 10, monitor:$monitor1, persistent:true, layout:scrolling

workspace = 11, monitor:$monitor2, default:true, persistent:true
workspace = 12, monitor:$monitor2, persistent:true
workspace = 13, monitor:$monitor2, persistent:true
workspace = 14, monitor:$monitor2, persistent:true
workspace = 15, monitor:$monitor2, persistent:true
workspace = 16, monitor:$monitor2, persistent:true
workspace = 17, monitor:$monitor2, persistent:true
workspace = 18, monitor:$monitor2, persistent:true
workspace = 19, monitor:$monitor2, persistent:true
workspace = 20, monitor:$monitor2, persistent:true

################
# LOOK & FEEL  #
################

general {
    gaps_in = 3
    gaps_out = 5
    border_size = 2

    col.active_border = rgba($blueAlphaff) rgba($mutedAlphaff) 45deg
    col.inactive_border = rgba($baseAlphaaa)

    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = true

    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

scrolling {
    column_width = 0.5
    fullscreen_on_one_column = true
    focus_fit_method = 0
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = false
    vrr = 2
}

xwayland {
    force_zero_scaling = true
}

render {
    # Allows SDR desktop apps like Waybar to work, while fullscreen games bypass to true HDR
    cm_fs_passthrough = 2
}

################
# INPUT        #
################

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

gesture = 3, horizontal, workspace

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

################
# KEYBINDINGS  #
################

$mainMod = SUPER

bind = $mainMod, Q, exec, kitty
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod SHIFT, L, exec, hyprlock
bind = $mainMod SHIFT, S, exec, HYPRSHOT_DIR="$HOME/Pictures/Screenshots/" hyprshot -m region
bind = $mainMod, V, togglefloating,
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, R, exec, wofi
bind = $mainMod, P, pseudo,
bind = $mainMod, S, togglesplit,

bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

bind = $mainMod, 1, exec, ~/.config/hypr/scripts/switch-workspace.sh 1
bind = $mainMod, 2, exec, ~/.config/hypr/scripts/switch-workspace.sh 2
bind = $mainMod, 3, exec, ~/.config/hypr/scripts/switch-workspace.sh 3
bind = $mainMod, 4, exec, ~/.config/hypr/scripts/switch-workspace.sh 4
bind = $mainMod, 5, exec, ~/.config/hypr/scripts/switch-workspace.sh 5
bind = $mainMod, 6, exec, ~/.config/hypr/scripts/switch-workspace.sh 6
bind = $mainMod, 7, exec, ~/.config/hypr/scripts/switch-workspace.sh 7
bind = $mainMod, 8, exec, ~/.config/hypr/scripts/switch-workspace.sh 8
bind = $mainMod, 9, exec, ~/.config/hypr/scripts/switch-workspace.sh 9
bind = $mainMod, 0, exec, ~/.config/hypr/scripts/switch-workspace.sh 10

bind = $mainMod SHIFT, 1, exec, ~/.config/hypr/scripts/move-workspace.sh 1
bind = $mainMod SHIFT, 2, exec, ~/.config/hypr/scripts/move-workspace.sh 2
bind = $mainMod SHIFT, 3, exec, ~/.config/hypr/scripts/move-workspace.sh 3
bind = $mainMod SHIFT, 4, exec, ~/.config/hypr/scripts/move-workspace.sh 4
bind = $mainMod SHIFT, 5, exec, ~/.config/hypr/scripts/move-workspace.sh 5
bind = $mainMod SHIFT, 6, exec, ~/.config/hypr/scripts/move-workspace.sh 6
bind = $mainMod SHIFT, 7, exec, ~/.config/hypr/scripts/move-workspace.sh 7
bind = $mainMod SHIFT, 8, exec, ~/.config/hypr/scripts/move-workspace.sh 8
bind = $mainMod SHIFT, 9, exec, ~/.config/hypr/scripts/move-workspace.sh 9
bind = $mainMod SHIFT, 0, exec, ~/.config/hypr/scripts/move-workspace.sh 10

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

################
# PLUGINS      #
################

plugin {
    hyprexpo {
        columns = 4
        gap_size = 5
        bg_col = rgb(111111)
    }
}

# Dynamically apply the current DP-* mappings to the expo plugin over IPC when the config reloads
exec = ~/.config/hypr/scripts/update_expo_layout.sh

# Expo overview keybind
bind = ALT, tab, hyprexpo:expo, toggle

################
# RULES        #
################

windowrule {
    name = steam-launcher
    match:class = ^([Ss]team)$
    monitor = $monitor1
    workspace = 10
}

windowrule {
    name = steam-monitor
    match:class = ^(steam_app_.*)$
    monitor = $monitor1
    workspace = 10
}

windowrule {
    name = wofi-theme-fixes
    match:class = ^(wofi)$
    rounding = 16
    border_size = 0
}

windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes
}
